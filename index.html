<!doctype html>
<html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Recording Tool - Login</title>
<style>
  :root {
    --bg-main: #0a0d13;
    --panel-bg: rgba(15, 19, 28, 0.88);
    --panel-border: rgba(255, 255, 255, 0.12);
    --input-bg: #101624;
    --input-border: rgba(255, 255, 255, 0.18);
    --text-main: #f5f7fb;
    --text-secondary: #b5bfd4;
    --text-tertiary: #8894ac;
    --accent: #2f9bff;
    --accent-strong: #1586f2;
    --accent-ring: rgba(47, 155, 255, 0.34);
    --error: #ff7c7c;
    --shadow-lg: 0 30px 80px rgba(0, 0, 0, 0.52);
  }

  * { box-sizing: border-box; }

  html,
  body {
    width: 100%;
    height: 100%;
    min-height: 100%;
    margin: 0;
    padding: 0;
  }

  html {
    background: var(--bg-main);
  }

  body {
    font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text-main);
    color-scheme: dark;
    background:
      radial-gradient(980px 420px at 12% -10%, rgba(47, 155, 255, 0.22), transparent 62%),
      radial-gradient(1100px 520px at 90% 116%, rgba(62, 207, 142, 0.12), transparent 66%),
      radial-gradient(760px 420px at 50% 112%, rgba(124, 211, 255, 0.08), transparent 70%),
      var(--bg-main);
    display: grid;
    place-items: center;
    padding: 20px;
    line-height: 1.45;
  }

  .shell {
    width: min(560px, 100%);
    border-radius: 24px;
    border: 1px solid var(--panel-border);
    background: var(--panel-bg);
    backdrop-filter: blur(14px);
    box-shadow: var(--shadow-lg);
    padding: 28px 26px;
    animation: rise 420ms ease-out both;
  }

  .eyebrow {
    margin: 0;
    font-size: 0.88rem;
    color: #9ec9ff;
    letter-spacing: 0.03em;
    font-weight: 620;
  }

  h1 {
    margin: 10px 0 0;
    font-size: clamp(1.68rem, 3.2vw, 2rem);
    letter-spacing: -0.02em;
    font-weight: 650;
  }

  .helper {
    margin: 10px 0 0;
    color: var(--text-secondary);
    font-size: 0.95rem;
  }

  .divider {
    margin: 18px 0 16px;
    height: 1px;
    background: rgba(255, 255, 255, 0.12);
  }

  .form {
    margin-top: 0;
    display: grid;
    gap: 14px;
  }

  .field {
    display: grid;
    gap: 8px;
  }

  label {
    font-size: 0.9rem;
    color: #d6dbe8;
    font-weight: 560;
  }

  input {
    width: 100%;
    background: var(--input-bg);
    color: var(--text-main);
    border: 1px solid var(--input-border);
    border-radius: 13px;
    padding: 12px 13px;
    font-size: 0.98rem;
    transition: border-color 0.16s ease, box-shadow 0.16s ease, transform 0.16s ease;
  }

  input:focus {
    outline: none;
    border-color: rgba(47, 155, 255, 0.86);
    box-shadow: 0 0 0 4px var(--accent-ring);
    transform: translateY(-1px);
  }

  button {
    width: 100%;
    border: none;
    border-radius: 13px;
    padding: 12px 14px;
    background: linear-gradient(180deg, var(--accent), var(--accent-strong));
    color: #ffffff;
    font-size: 0.99rem;
    font-weight: 630;
    letter-spacing: 0.01em;
    cursor: pointer;
    box-shadow: 0 10px 28px rgba(32, 135, 235, 0.34);
    transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
  }

  button:hover {
    transform: translateY(-1px);
    filter: saturate(1.06);
    box-shadow: 0 12px 30px rgba(32, 135, 235, 0.4);
  }

  button:active {
    transform: translateY(0);
    box-shadow: 0 8px 18px rgba(32, 135, 235, 0.3);
  }

  .error {
    min-height: 1.18rem;
    color: var(--error);
    font-size: 0.88rem;
    margin-top: -2px;
  }

  .footnote {
    margin: 14px 0 0;
    color: #9aa6bf;
    font-size: 0.82rem;
    line-height: 1.45;
  }

  .privacy-note {
    margin: 8px 0 0;
    color: var(--text-tertiary);
    font-size: 0.8rem;
    line-height: 1.5;
  }

  @keyframes rise {
    from {
      opacity: 0;
      transform: translateY(12px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (max-width: 560px) {
    .shell {
      padding: 22px 18px;
      border-radius: 18px;
    }

    h1 {
      font-size: clamp(1.5rem, 8vw, 1.75rem);
    }

    .helper {
      font-size: 0.92rem;
    }
  }
</style>
<body>
  <main class="shell">
    <p class="eyebrow">Video2Speech</p>
    <h1>Sign in</h1>
    <p class="helper">Please sign in with your assigned credentials to continue to the recording page.</p>

    <div class="divider"></div>

    <form id="loginForm" class="form" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <div id="error" class="error" aria-live="polite"></div>
      <button type="submit">Log in</button>
    </form>

    <p class="footnote">Access is limited to authorized participants.</p>
    <p class="privacy-note">This website is solely for displaying reading materials. All of your recorded data stays on your local device; we do not collect or store it.</p>
  </main>

<script>
function getSafeNext(rawNext) {
  if (typeof rawNext !== 'string' || rawNext.length === 0) return '/app.html';
  if (!rawNext.startsWith('/') || rawNext.startsWith('//')) return '/app.html';
  return rawNext;
}

const params = new URLSearchParams(window.location.search);
const nextPath = getSafeNext(params.get('next'));

if (sessionStorage.getItem('v2s_auth_ok') === '1') {
  window.location.replace(nextPath);
}

const loginForm = document.getElementById('loginForm');
const usernameInput = document.getElementById('username');
const passwordInput = document.getElementById('password');
const errorEl = document.getElementById('error');

usernameInput.addEventListener('input', () => {
  errorEl.textContent = '';
});

passwordInput.addEventListener('input', () => {
  errorEl.textContent = '';
});

loginForm.addEventListener('submit', function handleLogin(event) {
  event.preventDefault();

  const username = usernameInput.value.trim().toLowerCase();
  const password = passwordInput.value;

  if (username === 'tianyu' && password === '1234') {
    sessionStorage.setItem('v2s_auth_ok', '1');
    sessionStorage.setItem('v2s_auth_user', 'Tianyu');
    window.location.replace(nextPath);
    return;
  }

  errorEl.textContent = 'Invalid username or password.';
  passwordInput.value = '';
  passwordInput.focus();
});
</script>
</body>
</html>
