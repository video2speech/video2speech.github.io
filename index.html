<!doctype html>
<html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Recording Tool - Login</title>
<style>
  html{width:100%;height:100%;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;width:100%;margin:0;padding:16px;line-height:1.5;background-color:#1a1a1a;color:#e0e0e0;box-sizing:border-box;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{border:1px solid #444;border-radius:12px;padding:24px;margin:16px 0;background-color:#2a2a2a;width:min(420px,100%)}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  button{padding:10px 14px;border-radius:10px;border:1px solid #555;background:#444;color:#e0e0e0;transition:all 0.1s ease;cursor:pointer}
  button:active{opacity:.8;transform:scale(0.95)}
  input{width:100%;padding:10px;border-radius:10px;border:1px solid #555;background-color:#333;color:#e0e0e0;box-sizing:border-box}
  h1{margin:0 0 6px 0;font-size:1.5rem}
  p{margin:0;color:#9ca3af}
  label{font-size:.95rem;color:#c8c8c8}
  .field{display:grid;gap:8px}
  .form{display:grid;gap:14px;margin-top:18px}
  .error{color:#f87171;min-height:1.25rem;font-size:.9rem}
</style>
<body>
  <div class="card">
    <h1>Sign in</h1>
    <p>Please log in to access the recording page.</p>
    <form id="loginForm" class="form" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <div id="error" class="error" aria-live="polite"></div>
      <div class="row">
        <button type="submit">Log in</button>
      </div>
    </form>
  </div>

<script>
function getSafeNext(rawNext) {
  if (typeof rawNext !== 'string' || rawNext.length === 0) return '/app.html';
  if (!rawNext.startsWith('/') || rawNext.startsWith('//')) return '/app.html';
  return rawNext;
}

const params = new URLSearchParams(window.location.search);
const nextPath = getSafeNext(params.get('next'));

if (sessionStorage.getItem('v2s_auth_ok') === '1') {
  window.location.replace(nextPath);
}

const loginForm = document.getElementById('loginForm');
const usernameInput = document.getElementById('username');
const passwordInput = document.getElementById('password');
const errorEl = document.getElementById('error');

loginForm.addEventListener('submit', function handleLogin(event) {
  event.preventDefault();

  const username = usernameInput.value.trim().toLowerCase();
  const password = passwordInput.value;

  if (username === 'tianyu' && password === '1234') {
    sessionStorage.setItem('v2s_auth_ok', '1');
    sessionStorage.setItem('v2s_auth_user', 'Tianyu');
    window.location.replace(nextPath);
    return;
  }

  errorEl.textContent = 'Invalid username or password.';
  passwordInput.value = '';
  passwordInput.focus();
});
</script>
</body>
</html>
