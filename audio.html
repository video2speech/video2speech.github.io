let stream, mediaRecorder, chunks = [];
let sentences = [];
let idx = 0;
let recording = false;
let recordingTimer = null; // Timer for auto-stop after 1 minute
let recordingStartTime = null; // Track recording start time
let timerInterval = null; // Timer display update interval
let storageMode = true; // Default to iPad mode (store locally)
let isRedo = false; // flag for redo mode
let db;
let audioContext;
let analyserNode;
let waveformFrameArray;
let waveformHistory = [];
let waveformLastSampleAt = 0;
let waveformAnimationId = null;
let waveformSourceNode = null;
let waveformSilenceGainNode = null;
let materialBoxResizeTimer = null;
const STORAGE_USAGE_THRESHOLD = 0.78;
const WAVEFORM_WINDOW_SECONDS = 3;
const WAVEFORM_POINTS_PER_SECOND = 60;
const WAVEFORM_MAX_POINTS = WAVEFORM_WINDOW_SECONDS * WAVEFORM_POINTS_PER_SECOND;
const MATERIAL_BOX_MIN_HEIGHT = 210;
const MATERIAL_BOX_BADGE_RESERVED = 44;
const AUDIO_DB_NAME = 'AudioRecorderDB';
const AUDIO_STORE = 'audios';
let storageBlocked = false;

// Initialize IndexedDB
async function initDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(AUDIO_DB_NAME, 1);
    
    request.onerror = () => reject(request.error);
    request.onsuccess = () => {
      db = request.result;
      resolve(db);
    };
    
    request.onupgradeneeded = (event) => {
      const db = event.target.result;
      
      // Audio storage table
      if (!db.objectStoreNames.contains(AUDIO_STORE)) {
        const store = db.createObjectStore(AUDIO_STORE, { keyPath: 'id', autoIncrement: true });
        store.createIndex('timestamp', 'timestamp', { unique: false });
        store.createIndex('sentence', 'sentence', { unique: false });
        store.createIndex('sentenceSet', 'sentenceSet', { unique: false });
        store.createIndex('sentenceIndex', 'sentenceIndex', { unique: false });
      }
      
      // Progress tracking table
      if (!db.objectStoreNames.contains('progress')) {
        const progressStore = db.createObjectStore('progress', { keyPath: 'sentenceSet' });
      }
    };
  });
}

// Store audio to IndexedDB
async function storeAudio(blob, fileName, sentence, sentenceSet, sentenceIndex) {
  return new Promise(async (resolve, reject) => {
    try {
      // Convert Blob to ArrayBuffer for IndexedDB storage
      const arrayBuffer = await blob.arrayBuffer();
      
      const transaction = db.transaction([AUDIO_STORE], 'readwrite');
      const store = transaction.objectStore(AUDIO_STORE);
      
      const audioData = {
        fileName: fileName,
        arrayBuffer: arrayBuffer, // Store as ArrayBuffer instead of Blob
        mimeType: blob.type, // Store MIME type separately
        sentence: sentence,
        sentenceSet: sentenceSet || 'custom',
        sentenceIndex: sentenceIndex || idx,
        timestamp: new Date().toISOString(),
        size: blob.size
      };
      
      const request = store.add(audioData);
      request.onsuccess = () => {
        console.log(`Audio stored successfully: ${fileName}`);
        resolve(request.result);
      };
      request.onerror = () => {
        console.error('IndexedDB store error:', request.error);
        reject(request.error);
      };
      
      transaction.onerror = () => {
        console.error('IndexedDB transaction error:', transaction.error);
        reject(transaction.error);
      };
    } catch (error) {
      console.error('Error converting blob to ArrayBuffer:', error);
      reject(error);
    }
  });
}

// Save progress
async function saveProgress(sentenceSet, currentIndex, isCompletion = false) {
  return new Promise(async (resolve, reject) => {
    try {
      // Get existing progress to check repetition count
      const existingProgress = await getProgress(sentenceSet);
      let repetitionCount = existingProgress ? (existingProgress.repetitionCount || 0) : 0;
      
      // If this is a completion, increment repetition count
      if (isCompletion) {
        repetitionCount++;
      }
      
      const transaction = db.transaction(['progress'], 'readwrite');
      const store = transaction.objectStore('progress');
      
      const progressData = {
        sentenceSet: sentenceSet,
        currentIndex: currentIndex,
        repetitionCount: repetitionCount,
        timestamp: new Date().toISOString()
      };
      
      const request = store.put(progressData);
      request.onsuccess = () => resolve();
      request.onerror = () => reject(request.error);
    } catch (error) {
      reject(error);
    }
  });
}

// Get progress
async function getProgress(sentenceSet) {
  return new Promise((resolve, reject) => {
    const transaction = db.transaction(['progress'], 'readonly');
    const store = transaction.objectStore('progress');
    const request = store.get(sentenceSet);
    
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

// Delete progress
async function deleteProgress(sentenceSet) {
  return new Promise((resolve, reject) => {
    const transaction = db.transaction(['progress'], 'readwrite');
    const store = transaction.objectStore('progress');
    const request = store.delete(sentenceSet);
    
    request.onsuccess = () => resolve();
    request.onerror = () => reject(request.error);
  });
}

function formatBytes(bytes) {
  if (!Number.isFinite(bytes) || bytes <= 0) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  const exponent = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
  const value = bytes / (1024 ** exponent);
  return `${value.toFixed(exponent === 0 ? 0 : 1)} ${units[exponent]}`;
}

async function getStoredAudioStats() {
  return new Promise((resolve, reject) => {
    const transaction = db.transaction([AUDIO_STORE], 'readonly');
    const store = transaction.objectStore(AUDIO_STORE);
    const request = store.openCursor();
    let count = 0;
    let totalSize = 0;

    request.onsuccess = () => {
      const cursor = request.result;
      if (!cursor) {
        resolve({ count, totalSize });
        return;
      }
      const size = Number(cursor.value?.size) || 0;
      totalSize += size;
      count += 1;
      cursor.continue();
    };
    request.onerror = () => reject(request.error);
    transaction.onerror = () => reject(transaction.error);
  });
}

async function forEachStoredAudio(visitor) {
  return new Promise((resolve, reject) => {
    const transaction = db.transaction([AUDIO_STORE], 'readonly');
    const store = transaction.objectStore(AUDIO_STORE);
    const request = store.openCursor();
    let index = 0;

    request.onsuccess = async () => {
      const cursor = request.result;
      if (!cursor) {
        resolve();
        return;
      }
      try {
        await visitor(cursor.value, index);
        index += 1;
        cursor.continue();
      } catch (error) {
        reject(error);
      }
    };
    request.onerror = () => reject(request.error);
    transaction.onerror = () => reject(transaction.error);
  });
}

async function getStorageEstimateWithExtra(extraBytes = 0) {
  if (!navigator.storage || typeof navigator.storage.estimate !== 'function') {
    return null;
  }
  try {
    const estimate = await navigator.storage.estimate();
    const usage = Number(estimate.usage) || 0;
    const quota = Number(estimate.quota) || 0;
    if (!quota) return null;
    return {
      usage,
      quota,
      projectedUsage: usage + Math.max(0, extraBytes)
    };
  } catch (error) {
    console.warn('Failed to estimate storage quota:', error);
    return null;
  }
}

async function refreshStorageBlockState(extraBytes = 0) {
  const estimate = await getStorageEstimateWithExtra(extraBytes);
  if (!estimate) {
    storageBlocked = false;
    return { blocked: false, estimate: null };
  }
  const thresholdBytes = estimate.quota * STORAGE_USAGE_THRESHOLD;
  const blocked = estimate.projectedUsage >= thresholdBytes;
  storageBlocked = blocked;
  return { blocked, estimate };
}

function getStorageBlockedMessage(estimate) {
  if (!estimate) {
    return 'Local storage is almost full. Please click Save All to export and clear cached recordings before recording more.';
  }
  const ratio = (estimate.projectedUsage / estimate.quota) * 100;
  const used = formatBytes(estimate.projectedUsage);
  const total = formatBytes(estimate.quota);
  return `Storage limit warning: projected usage is ${ratio.toFixed(1)}% (${used} / ${total}). Please click Save All to export and clear cached recordings before recording more.`;
}

async function downloadZipWithBestEffortStreaming(zip, zipFileName) {
  if (typeof window.showSaveFilePicker === 'function') {
    try {
      const fileHandle = await window.showSaveFilePicker({
        suggestedName: zipFileName,
        types: [{
          description: 'ZIP Archive',
          accept: { 'application/zip': ['.zip'] }
        }]
      });
      const writable = await fileHandle.createWritable();
      const streamHelper = zip.generateInternalStream({
        type: 'uint8array',
        streamFiles: true,
        compression: 'STORE'
      });

      await new Promise((resolve, reject) => {
        let writeChain = Promise.resolve();
        let failed = false;

        streamHelper.on('data', (chunk) => {
          if (failed) return;
          if (typeof streamHelper.pause === 'function') streamHelper.pause();
          writeChain = writeChain
            .then(() => writable.write(chunk))
            .then(() => {
              if (typeof streamHelper.resume === 'function') streamHelper.resume();
            })
            .catch((error) => {
              failed = true;
              reject(error);
            });
        });

        streamHelper.on('error', (error) => {
          failed = true;
          reject(error);
        });

        streamHelper.on('end', () => {
          writeChain.then(resolve).catch(reject);
        });

        if (typeof streamHelper.resume === 'function') {
          streamHelper.resume();
        }
      });

      await writable.close();
      return;
    } catch (error) {
      if (error?.name === 'AbortError') {
        throw new Error('Save canceled by user.');
      }
      console.warn('Streamed file save is not available, falling back to blob download:', error);
    }
  }

  const zipBlob = await zip.generateAsync({
    type: 'blob',
    streamFiles: true,
    compression: 'STORE'
  });
  const a = document.createElement('a');
  a.download = zipFileName;
  a.href = URL.createObjectURL(zipBlob);
  a.click();
  URL.revokeObjectURL(a.href);
}

// Clear all stored audios
async function clearAllStoredAudios() {
  return new Promise((resolve, reject) => {
    const transaction = db.transaction([AUDIO_STORE], 'readwrite');
    const store = transaction.objectStore(AUDIO_STORE);
    const request = store.clear();
    
    request.onsuccess = () => resolve();
    request.onerror = () => reject(request.error);
  });
}

// Sentence sets data
const sentenceSets = {
  'daily_2026': null
};

let currentSentenceSet = 'daily_2026';

// Load sentence set file
async function loadSentenceFile(filename) {
  try {
    const response = await fetch(filename);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const text = await response.text();
    return text.split('\n').map(s => s.trim()).filter(Boolean);
  } catch (error) {
    console.error(`Failed to load sentence file (${filename}):`, error);
    return null;
  }
}

function setMaterialBoxFixedHeightByLongestSentence() {
  const box = el('currentText');
  if (!box || !sentences.length) return;

  const styles = window.getComputedStyle(box);
  const boxWidth = box.clientWidth;
  if (!boxWidth) return;

  const meter = document.createElement('div');
  meter.style.position = 'absolute';
  meter.style.visibility = 'hidden';
  meter.style.pointerEvents = 'none';
  meter.style.left = '-99999px';
  meter.style.top = '0';
  meter.style.boxSizing = 'border-box';
  meter.style.width = `${boxWidth}px`;
  meter.style.padding = styles.padding;
  meter.style.border = styles.border;
  meter.style.borderRadius = styles.borderRadius;
  meter.style.fontFamily = styles.fontFamily;
  meter.style.fontSize = styles.fontSize;
  meter.style.fontWeight = styles.fontWeight;
  meter.style.lineHeight = styles.lineHeight;
  meter.style.letterSpacing = styles.letterSpacing;
  meter.style.textAlign = styles.textAlign;
  meter.style.whiteSpace = 'normal';
  meter.style.wordBreak = 'break-word';
  meter.style.height = 'auto';
  meter.style.minHeight = '0';
  meter.style.background = 'transparent';
  meter.style.color = 'transparent';

  document.body.appendChild(meter);

  let maxHeight = MATERIAL_BOX_MIN_HEIGHT;
  for (const sentence of sentences) {
    meter.textContent = sentence || ' ';
    const measured = meter.offsetHeight + MATERIAL_BOX_BADGE_RESERVED;
    if (measured > maxHeight) maxHeight = measured;
  }
  document.body.removeChild(meter);

  const fixed = Math.ceil(maxHeight);
  box.style.height = `${fixed}px`;
  box.style.minHeight = `${fixed}px`;
}

function scheduleMaterialBoxResize() {
  if (materialBoxResizeTimer) {
    clearTimeout(materialBoxResizeTimer);
  }
  materialBoxResizeTimer = setTimeout(() => {
    setMaterialBoxFixedHeightByLongestSentence();
  }, 120);
}


// Load sentence set
async function loadSentenceSet() {
  const selected = el('sentenceSet').value;
  currentSentenceSet = selected;
  
  const filename = 'newset/sentence_set_style.txt';
  
  // Load sentences from cache or file
  if (!sentenceSets[selected]) {
    sentenceSets[selected] = await loadSentenceFile(filename);
  }
  
  if (sentenceSets[selected]) {
    sentences = sentenceSets[selected];
    setMaterialBoxFixedHeightByLongestSentence();
    
    // Restore progress
    try {
      const progress = await getProgress(selected);
      if (progress && progress.currentIndex < sentences.length) {
        idx = progress.currentIndex;
        console.log(`Progress restored: sentence ${idx + 1}`);
      } else {
        idx = 0;
      }
    } catch (error) {
      console.error('Failed to restore progress:', error);
      idx = 0;
    }
    
    await updateSentenceView();
  } else {
    sentences = [];
    idx = 0;
    const box = el('currentText');
    if (box) {
      box.style.height = `${MATERIAL_BOX_MIN_HEIGHT}px`;
      box.style.minHeight = `${MATERIAL_BOX_MIN_HEIGHT}px`;
    }
    await updateSentenceView();
  }
}

// Reset progress
async function resetProgress() {
  if (!confirm('Are you sure you want to reset the recording progress for the current sentence set?')) return;
  
  try {
    await deleteProgress(currentSentenceSet);
    idx = 0;
    await updateSentenceView();
    alert('Progress has been reset');
  } catch (error) {
    console.error('Failed to reset progress:', error);
    alert('Failed to reset progress: ' + error.message);
  }
}

// Clear all progress
async function clearAllProgress() {
  if (!confirm('Are you sure you want to clear all recording progress? This action cannot be undone!')) return;
  
  try {
    const transaction = db.transaction(['progress'], 'readwrite');
    const store = transaction.objectStore('progress');
    await new Promise((resolve, reject) => {
      const request = store.clear();
      request.onsuccess = () => resolve();
      request.onerror = () => reject(request.error);
    });
    
    // Reset current progress
    idx = 0;
    await updateSentenceView();
    alert('All progress has been cleared');
  } catch (error) {
    console.error('Failed to clear progress:', error);
    alert('Failed to clear progress: ' + error.message);
  }
}

// Initialize database
initDB().then(() => {
  console.log('IndexedDB initialized successfully');
  updateStorageInfo();
  // Try to restore sentence set selection on page load
  loadSentenceSet();
}).catch(err => {
  console.error('IndexedDB initialization failed:', err);
});

window.addEventListener('resize', () => {
  if (!sentences.length) return;
  scheduleMaterialBoxResize();
});

async function updateSentenceView(){
  const currentTextEl = el('currentText');
  const progressEl = el('idxInfo');
  
  // Clear all text nodes but keep the progress indicator
  currentTextEl.childNodes.forEach(node => {
    if (node.nodeType === Node.TEXT_NODE) {
      node.remove();
    }
  });
  
  let text = '';
  let progressText = '';
  
  // Normal recording mode
  const total = sentences.length;
  text = total ? sentences[idx] : '';
  progressText = total ? `${idx+1} / ${total}` : '';
  
  // Add the new text
  const textNode = document.createTextNode(text || 'No sentences available');
  currentTextEl.insertBefore(textNode, progressEl);
  
  progressEl.textContent = progressText;
  
  // Add default preparing state (blinking gray)
  currentTextEl.className = 'big sentence-preparing';
}

function updateRecordingTimer() {
  if (!recording || !recordingStartTime) return;
  
  const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
  const minutes = Math.floor(elapsed / 60);
  const seconds = elapsed % 60;
  const timeStr = `${minutes}:${seconds.toString().padStart(2, '0')}`;
  
  el('recordingStatus').textContent = `🔴 REC ${timeStr}`;
}

function setStartStopButtonState(isRecording) {
  const btn = el('startStop');
  if (!btn) return;
  if (isRecording) {
    btn.textContent = '⏭ Stop & Next';
    btn.style.background = '#7a5b5b';
    btn.style.color = '#fff6f6';
    btn.style.borderColor = '#9f7a7a';
    btn.style.boxShadow = '0 1px 4px rgba(0, 0, 0, 0.2)';
  } else {
    btn.textContent = '▶ Start';
    btn.style.background = '#5a7663';
    btn.style.color = '#f4fbf4';
    btn.style.borderColor = '#7ea58a';
    btn.style.boxShadow = '0 1px 4px rgba(0, 0, 0, 0.18)';
  }
}

// Clean up recording resources
function cleanupRecording() {
  // Clear timers
  if (recordingTimer) {
    clearTimeout(recordingTimer);
    recordingTimer = null;
  }
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
  
  // Reset state
  recordingStartTime = null;
  recording = false;
  
  // Reset UI
  el('recordingStatus').textContent = 'Preparing';
  el('recordingStatus').style.color = '#888';
  el('currentText').className = 'big sentence-preparing';
  setStartStopButtonState(false);
  stopWaveformVisualization();
  
  console.log('Recording cleanup completed');
}

function clearWaveformCanvas(resize = true) {
  const canvas = el('audioWaveform');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const width = canvas.clientWidth || canvas.width;
  const height = canvas.clientHeight || canvas.height;
  if (resize) {
    canvas.width = Math.floor(width * dpr);
    canvas.height = Math.floor(height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  ctx.fillStyle = '#0f0f0f';
  ctx.fillRect(0, 0, width, height);
}

function initWaveformAnalyzer() {
  if (!stream) return;

  clearWaveformCanvas();

  if (!audioContext || audioContext.state === 'closed') {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioContext.state === 'suspended') {
    audioContext.resume().catch(() => {});
  }

  if (waveformSourceNode) {
    try { waveformSourceNode.disconnect(); } catch (e) {}
  }
  if (waveformSilenceGainNode) {
    try { waveformSilenceGainNode.disconnect(); } catch (e) {}
  }

  analyserNode = audioContext.createAnalyser();
  analyserNode.fftSize = 2048;
  analyserNode.smoothingTimeConstant = 0.85;
  waveformFrameArray = new Float32Array(analyserNode.fftSize);

  waveformSourceNode = audioContext.createMediaStreamSource(stream);
  waveformSourceNode.connect(analyserNode);

  waveformSilenceGainNode = audioContext.createGain();
  waveformSilenceGainNode.gain.value = 0;
  analyserNode.connect(waveformSilenceGainNode);
  waveformSilenceGainNode.connect(audioContext.destination);
}

function stopWaveformVisualization() {
  if (waveformAnimationId) {
    cancelAnimationFrame(waveformAnimationId);
    waveformAnimationId = null;
  }
  waveformHistory = [];
  waveformLastSampleAt = 0;
  clearWaveformCanvas();
}

function startWaveformVisualization() {
  if (!analyserNode || !waveformFrameArray) return;

  stopWaveformVisualization();

  const canvas = el('audioWaveform');
  const ctx = canvas.getContext('2d');
  const width = canvas.clientWidth || canvas.width;
  const height = canvas.clientHeight || canvas.height;
  const mid = height / 2;
  const half = height * 0.38;
  const step = width / Math.max(WAVEFORM_MAX_POINTS - 1, 1);

  const draw = (timestamp) => {
    if (!recording) return;
    waveformAnimationId = requestAnimationFrame(draw);
    analyserNode.getFloatTimeDomainData(waveformFrameArray);

    const sampleIntervalMs = 1000 / WAVEFORM_POINTS_PER_SECOND;
    if (!waveformLastSampleAt) waveformLastSampleAt = timestamp;
    if (timestamp - waveformLastSampleAt >= sampleIntervalMs) {
      let peak = 0;
      for (let i = 0; i < waveformFrameArray.length; i++) {
        const v = Math.abs(waveformFrameArray[i]);
        if (v > peak) peak = v;
      }
      waveformHistory.push(Math.min(1, peak));
      if (waveformHistory.length > WAVEFORM_MAX_POINTS) {
        waveformHistory.shift();
      }
      waveformLastSampleAt = timestamp;
    }

    clearWaveformCanvas(false);
    const points = waveformHistory;
    if (!points.length) return;

    const startX = width - Math.max(points.length - 1, 0) * step;

    ctx.fillStyle = 'rgba(76, 175, 80, 0.28)';
    ctx.beginPath();
    ctx.moveTo(startX, mid);
    for (let i = 0; i < points.length; i++) {
      const x = startX + i * step;
      const yTop = mid - points[i] * half;
      ctx.lineTo(x, yTop);
    }
    for (let i = points.length - 1; i >= 0; i--) {
      const x = startX + i * step;
      const yBottom = mid + points[i] * half;
      ctx.lineTo(x, yBottom);
    }
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = '#4CAF50';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let i = 0; i < points.length; i++) {
      const x = startX + i * step;
      const y = mid - points[i] * half;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  };

  waveformAnimationId = requestAnimationFrame(draw);
}

function playRecordingStartSound() {
  try {
    // Create audio context
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    
    // Create oscillator for the "beep" sound
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    
    // Connect oscillator to gain to destination
    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);
    
    // Set frequency for a pleasant "beep" sound (around 800Hz)
    oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
    
    // Set volume envelope for a quick "beep"
    gainNode.gain.setValueAtTime(0, audioContext.currentTime);
    gainNode.gain.linearRampToValueAtTime(0.6, audioContext.currentTime + 0.01);
    gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.2);
    
    // Start and stop the sound
    oscillator.start(audioContext.currentTime);
    oscillator.stop(audioContext.currentTime + 0.2);
  } catch (error) {
    // Silently fail if audio context is not available
    console.log('Audio not available:', error);
  }
}

function playRecordingStopSound() {
  try {
    // Create audio context
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    
    // Create oscillator for the "stop" sound (lower pitch)
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    
    // Connect oscillator to gain to destination
    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);
    
    // Set frequency for a lower "stop" sound (around 500Hz)
    oscillator.frequency.setValueAtTime(500, audioContext.currentTime);
    
    // Set volume envelope for a slightly longer "stop" sound
    gainNode.gain.setValueAtTime(0, audioContext.currentTime);
    gainNode.gain.linearRampToValueAtTime(0.6, audioContext.currentTime + 0.01);
    gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.3);
    
    // Start and stop the sound
    oscillator.start(audioContext.currentTime);
    oscillator.stop(audioContext.currentTime + 0.3);
  } catch (error) {
    // Silently fail if audio context is not available
    console.log('Audio not available:', error);
  }
}

// Update storage info
async function updateStorageInfo() {
  if (!db) {
    console.log('Database not initialized yet');
    return;
  }
  
  try {
    const { count, totalSize } = await getStoredAudioStats();
    const sizeInMB = (totalSize / (1024 * 1024)).toFixed(1);
    const blockState = await refreshStorageBlockState();
    const quotaText = blockState.estimate
      ? `, storage ${(blockState.estimate.usage / blockState.estimate.quota * 100).toFixed(1)}% used`
      : '';

    const baseInfo = count > 0 ? `Cached ${count} recordings, ~${sizeInMB} MB${quotaText}` : '';
    el('storageInfo').textContent = storageBlocked
      ? `${baseInfo ? `${baseInfo} | ` : ''}Near storage limit, click Save All`
      : baseInfo;
    
    console.log(`Storage info updated: ${count} recordings, ${sizeInMB} MB`);
  } catch (error) {
    console.error('Failed to update storage info:', error);
    // Update UI even if error occurs to avoid freezing
    el('storageInfo').textContent = '';
  }
}

el('downloadAll').onclick = async () => {

      return;
    }
    
    if (!confirm(`Are you sure you want to download all ${count} recordings as a ZIP file? Recordings will be automatically cleared from cache after download.`)) return;
    
    // Show progress indicator
    el('downloadAll').textContent = 'Creating ZIP...';
    el('downloadAll').disabled = true;
    
    // Create ZIP file
    const zip = new JSZip();
    
    // Add all audios to ZIP with cursor iteration to avoid loading everything at once
    await forEachStoredAudio(async (audioRecord, i) => {
      const mimeType = audioRecord.mimeType || 'audio/webm';
      const blob = new Blob([audioRecord.arrayBuffer], { type: mimeType });
      zip.file(audioRecord.fileName, blob, { compression: 'STORE' });
      el('downloadAll').textContent = `Adding ${i + 1}/${count}...`;
    });
    
    // Generate and save ZIP file
    el('downloadAll').textContent = 'Saving ZIP...';
    
    // Create download link for ZIP
    const currentDate = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
    const zipFileName = `audio-recordings-${currentDate}.zip`;
    await downloadZipWithBestEffortStreaming(zip, zipFileName);
    
    console.log(`Downloaded ZIP file: ${zipFileName}`);
    
    // Remove focus from button to restore keyboard shortcuts
    el('downloadAll').blur();
    
    // Delete all audios from storage
    await clearAllStoredAudios();
    await updateStorageInfo();
    el('downloadAll').textContent = '💾 Save All';
    el('downloadAll').disabled = false;
    el('downloadAll').blur();
    
  } catch (error) {

    el('downloadAll').disabled = false;
    el('downloadAll').blur(); // Remove focus to restore keyboard shortcuts

};

};

async function startRecording() {
  if (!stream) return alert('Please initialize microphone first!');
  if (recording) return;
  const blockState = await refreshStorageBlockState();
  if (blockState.blocked || storageBlocked) {
    alert(getStorageBlockedMessage(blockState.estimate));
    return;
  }
  
  // Check if stream is still active
  const audioTrack = stream.getAudioTracks()[0];
  if (!audioTrack || !audioTrack.enabled || audioTrack.readyState !== 'live') {
    alert('Microphone stream is not active. Please reinitialize microphone.');
    console.error('Stream issue detected:', {
      hasTrack: !!audioTrack,
      enabled: audioTrack?.enabled,
      readyState: audioTrack?.readyState
    });
    return;
  }
  
  // Clean up previous MediaRecorder if it exists
  if (mediaRecorder) {
    try {
      if (mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      mediaRecorder.ondataavailable = null;
      mediaRecorder.onstop = null;
      mediaRecorder.onerror = null;
    } catch (e) {
      console.warn('Error cleaning up previous MediaRecorder:', e);
    }
    mediaRecorder = null;
  }
  
  // Clear chunks array
  chunks = [];
  
  // Prefer AAC/MP4 then fallback to Opus/WebM.
  const audioOptions = [
    'audio/mp4;codecs=mp4a.40.2',
    'audio/mp4',
    'audio/webm;codecs=opus',
    'audio/webm'
  ];
  const mimeType = audioOptions.find(type => MediaRecorder.isTypeSupported(type)) || '';
  
  try {
    // Request timeslice to prevent memory buildup (collect data every 1 second)
    const recorderOptions = mimeType ? { mimeType, audioBitsPerSecond: 128000 } : { audioBitsPerSecond: 128000 };
    mediaRecorder = new MediaRecorder(stream, recorderOptions);
    
    mediaRecorder.ondataavailable = e => { 
      if (e.data && e.data.size > 0) {
        chunks.push(e.data);
        console.log(`Chunk received: ${e.data.size} bytes, total chunks: ${chunks.length}`);
      }
    };
    
    mediaRecorder.onstop = saveBlob;
    
    mediaRecorder.onerror = (event) => {
      console.error('MediaRecorder error:', event.error);
      alert('Recording error occurred: ' + event.error);
      recording = false;
      cleanupRecording();
    };
    
    // Play recording start sound
    playRecordingStartSound();
    
    // Start with timeslice of 1000ms to regularly emit data
    mediaRecorder.start(1000);
    recording = true;
    recordingStartTime = Date.now();
    startWaveformVisualization();
    
    // Set 1-minute auto-stop timer
    recordingTimer = setTimeout(() => {
      if (recording && mediaRecorder) {
        console.log('Auto-stopping recording after 1 minute');
        stopRecording();
      }
    }, 60000); // 60 seconds
    
    // Start timer display updates
    timerInterval = setInterval(updateRecordingTimer, 1000);
    
    // Update recording status and sentence appearance
    el('recordingStatus').textContent = '🔴 REC 0:00';
    el('recordingStatus').style.color = '#f44336';
    el('currentText').className = 'big sentence-recording';
    
    // Update start/stop toggle button state
    setStartStopButtonState(true);
    
    // Remove focus from button to allow keyboard shortcuts
    el('startStop').blur();
    
  } catch (error) {
    console.error('Failed to start MediaRecorder:', error);
    alert('Failed to start recording: ' + error.message);
    cleanupRecording();
  }
}

function stopRecording() {
  if (mediaRecorder && recording) {
    try {
      // Play recording stop sound
      playRecordingStopSound();
      
      // Stop the MediaRecorder
      if (mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      
      // Use the cleanup function
      cleanupRecording();
      
      // Remove focus from button to allow keyboard shortcuts
      el('startStop').blur();
      
      console.log('Recording stopped successfully');
    } catch (error) {
      console.error('Error stopping recording:', error);
      // Force cleanup even if stop failed
      cleanupRecording();
      el('startStop').blur();
      alert('Error stopping recording: ' + error.message);
    }
  }
}

el('startStop').onclick = () => {
  if (recording) {
    stopRecording();
  } else {
    startRecording();
  }
};

// Add keyboard shortcut support
document.addEventListener('keydown', (event) => {
  // Only trigger when not focused on input elements
  if (!['INPUT', 'TEXTAREA', 'SELECT'].includes(event.target.tagName)) {
    
    // Spacebar: Start/Stop recording
    if (event.code === 'Space') {
      event.preventDefault(); // Prevent page scrolling
      el('startStop').click();
    }
    
    // Left Arrow: Redo last sentence
    else if (event.code === 'ArrowLeft') {
      event.preventDefault(); // Prevent default behavior
      
      if (!recording) { // Only allow redo when not recording
        el('redo').click();
      }
    }
  }
});

function sanitize(s){
  return s.replace(/[\\/:*?"<>|]/g,'').replace(/\s+/g,' ').trim();
}
function ts(){
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
}
async function saveBlob(){
  try {
    // Check if we have valid chunks
    if (!chunks || chunks.length === 0) {
      console.warn('No audio chunks to save');
      chunks = []; // Clear the array
      return;
    }
    
    // Determine file extension based on actual mimeType used
    const recorderMime = (mediaRecorder && mediaRecorder.mimeType) ? mediaRecorder.mimeType : '';
    const fallbackChunkType = chunks.find(chunk => chunk.type)?.type || '';
    const actualMime = recorderMime || fallbackChunkType || 'audio/webm';
    let fileExt = 'webm';
    if (actualMime.includes('mp4') || actualMime.includes('aac')) fileExt = 'm4a';
    else if (actualMime.includes('mpeg')) fileExt = 'mp3';
    
    const blob = new Blob(chunks, { type: actualMime });
    
    // Check if blob is valid
    if (blob.size === 0) {
      console.warn('Created blob has zero size');
      chunks = []; // Clear the array
      return;
    }
    
    console.log(`Created blob: ${blob.size} bytes from ${chunks.length} chunks`);
    
    const sentence = sentences[idx] ? sanitize(sentences[idx]) : 'unknown_sentence';
    const timestamp = ts();
    const redoSuffix = isRedo ? '_redo' : '';
    
    // Get progress info for filename
    let progressInfo = '';
    try {
      const progress = await getProgress(currentSentenceSet);
      const total = sentences.length;
      const currentPos = idx + 1;
      
      // Always include repeat count in filename, starting from repeat1
      const repeatCount = progress ? (progress.repetitionCount || 0) + 1 : 1;
      progressInfo = `_${currentPos}-${total}_repeat${repeatCount}`;
    } catch (error) {
      console.error('Failed to get progress for filename:', error);
      progressInfo = `_${idx + 1}-${sentences.length}`;
    }
    
    const fileName = `${sentence}${progressInfo}_${timestamp}${redoSuffix}.${fileExt}`;
    
    if (storageMode) {
      // iPad mode: Store to IndexedDB
      try {
        const blockState = await refreshStorageBlockState(blob.size);
        if (blockState.blocked) {
          const blockedMessage = getStorageBlockedMessage(blockState.estimate);
          alert(blockedMessage);
          // Keep the current recording by downloading it directly, but block further cached recording.
          directDownload(blob, fileName);
          chunks = [];
          return;
        }
        await storeAudio(blob, fileName, sentences[idx] || 'unknown sentence', currentSentenceSet, idx);
        // Update storage info asynchronously to avoid blocking
        setTimeout(() => updateStorageInfo(), 100);
        console.log(`Audio stored locally: ${fileName}`);
      } catch (error) {
        console.error('Failed to store audio:', error);
        alert('Failed to store audio: ' + error.message);
        // Fallback to direct download on failure
        directDownload(blob, fileName);
      }
    } else {
      // Normal mode: Direct download
      directDownload(blob, fileName);
    }
    
    // Clear chunks array immediately after use to free memory
    chunks = [];
    
    // Reset redo flag after recording completion
    isRedo = false;
    
    // Auto jump to next sentence after recording completion (if not the last sentence)
    if (idx < sentences.length - 1) {
      idx++;
      await updateSentenceView();
      
      // Save progress
      try {
        await saveProgress(currentSentenceSet, idx);
        console.log(`Auto moved to next sentence: sentence ${idx + 1}`);
      } catch (error) {
        console.error('Failed to save progress:', error);
      }
    } else {
      // All sentences completed, reset to first sentence for repetition
      idx = 0;
      
      // Save progress and increment repetition counter FIRST
      try {
        await saveProgress(currentSentenceSet, idx, true); // true indicates completion
        console.log(`Completed recording all ${sentences.length} sentences, starting next repetition`);
      } catch (error) {
        console.error('Failed to save progress:', error);
      }
      
      // Then update the sentence view to show the new repetition count
      await updateSentenceView();
    }
    
    // Display format information
    console.log(`Recording completed, format: ${fileExt.toUpperCase()}, MIME type: ${actualMime}`);
  } catch (error) {
    console.error('Error in saveBlob:', error);
    alert('Error saving recording: ' + error.message);
    // Clear chunks on error to prevent corruption
    chunks = [];
  }
}

function directDownload(blob, fileName) {
  const a = document.createElement('a');
  a.download = fileName;
  a.href = URL.createObjectURL(blob);
  a.click();
  URL.revokeObjectURL(a.href);
}
